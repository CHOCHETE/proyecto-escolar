<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <nav class="nav-bar">
        <div class="logo">
            <img src="img/logo3.png">
            <span>CodeNova Systems</span>
        </div>

        <button class="hamburger" id="hamburger" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Inicio</a></li>
        </ul>
    </nav>
</header>

<section>
    <h2>Equipo de Trabajo</h2>

    <div class="cards">
        <div class="card">Mauricio Junior Zarate López</div>
        <div class="card">Uriel Martínez García</div>
        <div class="card">Jesús Manuel Salinas Hernández</div>
        <div class="card">Josué Isaí Valdivia Castro</div>
        <div class="card">Josué de Jesús García Victoria</div>
    </div>

</section>

<footer>
    <p>CodeNova Systems</p>
</footer>

<script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    hamburger.addEventListener('click', function() {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
    });

    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', function() {
            navLinks.classList.remove('active');
            hamburger.classList.remove('active');
        });
    });
</script>

</body>
</html>
