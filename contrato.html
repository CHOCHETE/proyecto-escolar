<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios y Precios</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <nav class="nav-bar">
        <div class="logo">
            <img src="img/logo3.png">
            <span>CodeNova Systems</span>
        </div>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Inicio</a></li>
        </ul>
    </nav>
</header>

<script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    
    hamburger.addEventListener('click', function() {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
    });
    
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', function() {
            navLinks.classList.remove('active');
            hamburger.classList.remove('active');
        });
    });
</script>

<section>
    <h2>Precios de Servicios</h2>

    <table class="tabla">
        <tr>
            <th>Servicio</th>
            <th>Precio</th>
        </tr>
        <tr>
            <td>Mantenimiento Básico</td>
            <td>$400 - $750 MXN</td>
        </tr>
        <tr>

            <td>$600 - $1200 MXN</td>
        </tr>
        <tr>
            <td>Limpieza</td>
            <td>$160 - $400 MXN</td>
        </tr>
        <tr>
            <td>Reparación</td>
            <td>$800 - $4600 MXN</td>
        </tr>
        <tr>
            <td>Creacion de Página Web</td>
            <td>$2000 - $4600 MXN</td>
        </tr>
    </table>

    <br>

    <a href="https://wa.me/527446961853" target="_blank" class="btn">
        Contactar por WhatsApp
    </a>

</section>

<footer>
    <p>CodeNova Systems</p>
</footer>

</body>
</html>
