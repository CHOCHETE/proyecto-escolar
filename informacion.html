<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Información</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <nav class="nav-bar">
        <div class="logo">
            <img src="img/logo3.png">
            <span>CodeNova Systems</span>
        </div>

        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Inicio</a></li>
        </ul>
    </nav>
</header>

<script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    
    hamburger.addEventListener('click', function() {
        navLinks.classList.toggle('active');
        hamburger.classList.toggle('active');
    });
    
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', function() {
            navLinks.classList.remove('active');
            hamburger.classList.remove('active');
        });
    });
</script>

<section>
    <h2>Información del Equipo</h2>

    <p>
        Nuestro equipo está compuesto por profesionales capacitados en desarrollo,
        mantenimiento y soluciones tecnológicas.
    </p>

    <p>
        Trabajamos con enfoque en calidad, eficiencia y satisfacción del cliente.
    </p>

</section>

<footer>
    <p>CodeNova Systems</p>
</footer>

</body>
</html>
